version: "{build}"

clone_depth: 5

branches:
  only:
    - master
    - themes
    - /.*-stable/

build: off

environment:
  APPVEYOR_SAVE_CACHE_ON_ERROR: true

  matrix:
    - RUBY_FOLDER_VER: 26-x64
      TEST_SUITE: test
    - RUBY_FOLDER_VER: 25-x64
      TEST_SUITE: test
    - RUBY_FOLDER_VER: 24-x64
      TEST_SUITE: test
    - RUBY_FOLDER_VER: 23-x64
      TEST_SUITE: test

init:
  # Install Ruby 2.6.0 if needed
  # Download new EventMachine pre-compiled gem and install in Ruby
  - ps: |
      $rubydir = "C:\Ruby$env:RUBY_FOLDER_VER"
      $wc = $(New-Object System.Net.WebClient)
      if ( ($env:RUBY_FOLDER_VER -eq "26-x64") -and !(Test-Path -Path $rubydir -PathType Container) ) {
        $ghri2 = "https://github.com/oneclick/rubyinstaller2/releases/download"
        $rfldr = "RubyInstaller-2.6.0-1"
        $rnew = "rubyinstaller-2.6.0-1-x64"
        $uri = "$ghri2/$rfldr/$rnew" + ".7z"
        $fn = "$env:TEMP\$rnew" + ".7z"
        $wc.DownloadFile($uri, $fn)
        7z x $fn -oC:\ 1> $null
        Rename-Item -Path "C:\$rnew" -NewName $rubydir
      }
      $env:PATH = "$rubydir\bin;$env:PATH"
      $uri = "https://ci.appveyor.com/api/buildjobs/vfw89xfuto65p24r/artifacts/eventmachine-1.3.0.dev.1-x64-mingw32.gem"
      $fn_em = "C:\eventmachine-1.3.0.dev.1-x64-mingw32.gem"
      $wc.DownloadFile($uri, $fn_em)
      gem install -lN $fn_em

install:
  # symlink ruby installed EventMachine to vendor/bundle location
  - ps: |
      $env:BUNDLE_WITHOUT = "benchmark:site:development"
      bundle install --retry 5 --jobs=$env:NUMBER_OF_PROCESSORS --clean --path vendor\bundle
      $rv = $(ruby -e "STDOUT.write RbConfig::CONFIG['ruby_version']")
      $em = "eventmachine-1.3.0.dev.1-x64-mingw32"
      $b_gem = "$env:APPVEYOR_BUILD_FOLDER\vendor\bundle\ruby\$rv\gems\eventmachine-1.2.7-x64-mingw32\lib"
      $r_gem = "C:\Ruby$env:RUBY_FOLDER_VER\lib\ruby\gems\$rv\gems\$em\lib"
      rd $b_gem -Recurse
      New-Item -Path $b_gem -ItemType Junction -Value $r_gem 1> $null

test_script:
  - bash ./script/cibuild

after_test:
  - ps: |
      Write-Host
      ruby --version
      Write-Host RubyGems version $(gem --version)
      bundler version
      Write-Host

cache:
  # If one of the files after the right arrow changes, cache will be invalidated
  - vendor\bundle -> appveyor.yml, Gemfile, jekyll.gemspec
